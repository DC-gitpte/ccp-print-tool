stages:
  - lint
  - test
  - build
  - deploy

variables:
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE/ccp-print-tool
  PYTHON_VERSION: "3.12"

# --- LINT ---
lint:python:
  stage: lint
  image: python:${PYTHON_VERSION}-slim
  script:
    - pip install ruff
    - ruff check src/ tests/
    - ruff format --check src/ tests/

lint:dockerfile:
  stage: lint
  image: hadolint/hadolint:latest-debian
  script:
    - hadolint Dockerfile
  allow_failure: true

# --- TEST ---
test:unit:
  stage: test
  image: python:${PYTHON_VERSION}-slim
  script:
    - pip install -e ".[dev]"
    - pytest tests/ --junitxml=report.xml --cov=src --cov-report=xml
  artifacts:
    reports:
      junit: report.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    when: always

# --- BUILD ---
build:docker:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $DOCKER_IMAGE:$CI_COMMIT_SHA -t $DOCKER_IMAGE:latest .
    - docker push $DOCKER_IMAGE:$CI_COMMIT_SHA
    - docker push $DOCKER_IMAGE:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# --- DEPLOY ---
deploy:staging:
  stage: deploy
  image: alpine:latest
  script:
    - echo "Deploying $DOCKER_IMAGE:$CI_COMMIT_SHA to staging"
  environment:
    name: staging
    url: https://ccp-staging.internal
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

deploy:production:
  stage: deploy
  image: alpine:latest
  script:
    - echo "Deploying $DOCKER_IMAGE:$CI_COMMIT_SHA to production"
  environment:
    name: production
    url: https://ccp.internal
  rules:
    - if: $CI_COMMIT_TAG
      when: manual
